<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نقاشیخط | گالری مهدیس</title>
<style>
    .logo{
    text-align:center;
    padding-top:30px;
}

.logo img{
    width:180px;
    max-width:70%;
}
.hero{

text-align:center;
padding:60px 20px;

background:linear-gradient(
135deg,
#fff8f5,
#f7e4dc
);

margin-bottom:30px;

}

.hero h1{

font-size:60px;
color:#8b5e5e;
margin-bottom:10px;

}

.hero p{

font-size:20px;
color:#9a7777;

}
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body


{
font-family:'Vazirmatn',sans-serif;
background:#fffaf7;
}
header{
text-align:center;
padding:50px 20px;
}
header h1{
font-size:48px;
color:#7c5a4f;
}
header p{
margin-top:10px;
color:#8b6d62;
}
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
padding:30px;
max-width:1200px;
margin:auto;
}
.gallery img{
width:100%;
height:350px;
object-fit:cover;
border-radius:20px;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
transition:.3s;
}
.gallery img:hover{
transform:scale(1.03);
}
.back{
display:block;
width:max-content;
margin:30px auto;
text-decoration:none;
color:#7c5a4f;
font-size:18px;
}
.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
z-index:999;
}
.lightbox img{
max-width:90%;
max-height:90%;
border-radius:15px;
}
</style>
</head>
<body>
<header>
<h1>نقاشیخط 🖌️</h1>
<p>نمونه آثار</p>
</header>
<div class="gallery">
<img src="./images/n1.jpg" onclick="show(this.src)">
<img src="./images/n2.jpg" onclick="show(this.src)">
<img src="./images/n3.jpg" onclick="show(this.src)">
</div>


<div class="lightbox" id="lightbox" onclick="hide()">
<img id="bigImage">
</div>
<script>
function show(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("bigImage").src=src;
}
function hide(){
document.getElementById("lightbox").style.display="none";
}
</script>
</body>
</html>
